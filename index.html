function parseJSON(raw){
  if(!raw||!raw.trim())throw new Error('Empty response');
  let s=raw.replace(/^```json\s*/i,'').replace(/```\s*$/,'').trim();
  const i=s.indexOf('{');if(i<0)throw new Error('No JSON object in response');
  s=s.slice(i);
  // Try straight parse
  try{return JSON.parse(s);}catch(_){}
  // Try adding closing braces
  for(let c=1;c<=8;c++){try{return JSON.parse(s+'}'.repeat(c));}catch(_){}}
  // Try truncating at last complete key-value pair
  const lc=s.lastIndexOf(',"');
  if(lc>10){try{return JSON.parse(s.slice(0,lc)+'}'.repeat(4));}catch(_){}}
  const lc2=s.lastIndexOf('",');
  if(lc2>10){try{return JSON.parse(s.slice(0,lc2)+'"}'.repeat(2));}catch(_){}}
  throw new Error('Could not parse — raw: '+s.substring(0,200));
}
function lastText(c){if(!Array.isArray(c))return'';return c.filter(b=>b.type==='text').map(b=>b.text).pop()||'';}

// FIX 1: Promise.race — no AbortController (crashes in Claude.ai iframe)
// FIX 4: Increased timeouts
async function ask(messages,system,maxTok,ms){
  ms=ms||120000;
  const body={model:'claude-sonnet-4-20250514',max_tokens:maxTok||2000,system,messages,tools:[{type:'web_search_20250305',name:'web_search'}]};
  async function doFetch(){
    let r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    let d=await r.json();if(d.error)throw new Error(d.error.message);
    let n=0;
    while(d.stop_reason==='tool_use'&&n<5){
      n++;
      const res=d.content.filter(b=>b.type==='tool_use').map(b=>({type:'tool_result',tool_use_id:b.id,content:'Search complete. Now return only the JSON object requested.'}));
      r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...body,messages:[...messages,{role:'assistant',content:d.content},{role:'user',content:res}]})});
      d=await r.json();if(d.error)throw new Error(d.error.message);
    }
    return lastText(d.content);
  }
  return Promise.race([doFetch(),new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timed out after '+Math.round(ms/1000)+'s')),ms))]);
}

function buildCSV(rows){return rows.map(r=>r.map(c=>{if(c==null)return'';const s=String(c);return(s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s.replace(/"/g,'""')}"`:s;}).join(',')).join('\n');}
function dlCSV(content,fn){const b=new Blob(['\uFEFF'+content],{type:'text/csv;charset=utf-8;'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=fn;document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u);},300);}

function renderFind(){

    else if(st==='cached')row.appendChild(span({style:{fontSize:'12px',color:'#4c1d95',fontWeight:'500',flexShrink:'0'}},['📋 Cached — instant']));

  return card;
}

// FIX 2: Cached companies use ZERO network calls — instant return
async function doFind(){
  S.busy=true;render();
  const today=new Date().toISOString().split('T')[0];
  for(const co of S.companies){
    const cached=getCache(co.n);
    if(cached){
      // Instant — no API call at all
      S.coStatus[co.n]='cached';
      S.sources[co.n]={...cached,found:true,approved:null,extra:[],anote:''};
      render();
      await new Promise(r=>setTimeout(r,100)); // tiny pause for UI
      continue;
    }
    S.coStatus[co.n]='searching';render();
    try{
      const t=await ask(
        [{role:'user',content:`Today is ${today}. Find the most recent sustainability or ESG report for "${co.n}". Search for it now.\n\nReturn ONLY this JSON object, no markdown:\n{"found":true,"report_url":"direct PDF or page URL","report_title":"title","report_year":"year e.g. 2024","confidence":"high","confidence_reason":"reason","company_website":"https://...","country_code":"US","industry":"sector","alternative_url":""}`}],
        'Find sustainability report. Return only JSON.',
        600,90000
      );
      S.sources[co.n]={...parseJSON(t),approved:null,extra:[],anote:''};
      S.coStatus[co.n]='done';
    }catch(e){
      S.sources[co.n]={found:false,report_url:'',confidence:'low',confidence_reason:e.message,approved:null,extra:[],anote:''};
      S.coStatus[co.n]='failed';
    }
    render();
  }
  S.busy=false;S.step=2;render();
}

// FIX 3: Sequential extraction (not parallel) prevents API overwhelm on large companies
async function doExtract(){
  S.busy=true;
  const appr=S.companies.filter(c=>S.sources[c.n]?.approved===true);
  S.exStatus={};S.exMsg={};appr.forEach(c=>{S.exStatus[c.n]='waiting';});
  const today=new Date().toISOString().split('T')[0];render();

  for(const co of appr){
    S.exStatus[co.n]='extracting';S.exMsg[co.n]='fetching emissions...';render();
    const s=S.sources[co.n];
    const urls=[s.report_url,...(s.extra||[]).map(x=>x.u)].filter(Boolean);
    const ul=urls.map((u,i)=>`Source ${i+1}: ${u}`).join('\n');
    const ng=s.anote?'\n\nREVIEWER NOTE: '+s.anote:'';
    const on=Object.keys(S.overrides[co.n]||{}).length>0?'\n\nUSER OVERRIDES (ground truth):\n'+Object.entries(S.overrides[co.n]).map(([k,v])=>`${k}="${v}"`).join(', '):'';
    const yl=yls();const ey=Object.fromEntries(yl.map(y=>[y,null]));

    let emData={},scData={},itData={summary:'Intel unavailable'};

    // Step A: Emissions (sequential)
    try{
      const eP=`Today is ${today}. Fetch and read this sustainability report for "${co.n}":\n${ul}${ng}\n\nExtract GHG emissions tCO2e for years: ${yl.join(', ')}.\nReturn ONLY a JSON object. Use numbers not strings. Use null if not found.\nIMPORTANT: Do not include any text before or after the JSON.\n\n{"scope1":${JSON.stringify(ey)},"scope1_page":"","scope2_mb":${JSON.stringify(ey)},"scope2_lb":${JSON.stringify(ey)},"scope2_page":"","scope3_total":${JSON.stringify(ey)},"s3_1":${JSON.stringify(ey)},"s3_2":${JSON.stringify(ey)},"s3_3":${JSON.stringify(ey)},"s3_4":${JSON.stringify(ey)},"s3_5":${JSON.stringify(ey)},"s3_6":${JSON.stringify(ey)},"s3_7":${JSON.stringify(ey)},"s3_8":${JSON.stringify(ey)},"scope3_page":"","revenue_eur_m":null,"revenue_year":"","revenue_source":"","fte":null,"fte_year":"","fte_source":""}`;
      const eR=await ask([{role:'user',content:eP}],'Extract emissions data from sustainability report. Return ONLY the JSON object with no other text.',2000,120000);
      emData=parseJSON(eR);
    }catch(e){
      emData={};S.exMsg[co.n]='emissions: '+e.message.substring(0,50);render();
    }

    // Step B: Scoring (sequential)
    S.exMsg[co.n]='scoring maturity...';render();
    try{
      const sP=`Today is ${today}. Read this sustainability report for "${co.n}":\n${ul}${ng}${on}\n\nAnswer these scoring questions based on the report. Return ONLY a JSON object.\nDo NOT use CDP as a source unless the company's own report mentions their CDP disclosure.\n\n{"cdp_above_f":{"answer":"yes or no","detail":"","page":""},"cdp_score":{"answer":"A B C D E F or No data","detail":"","page":""},"public_report":{"answer":"yes or no","detail":"","page":""},"public_inventory":{"answer":"yes or no","detail":"","page":""},"upstream_s3":{"answer":"yes or no","detail":"","page":""},"downstream_s3":{"answer":"yes or no","detail":"","page":""},"s3_applicability":{"answer":"yes or no","detail":"","page":""},"s3_methodology":{"answer":"yes or no","detail":"","page":""},"s1s2_targets":{"answer":"yes or no","detail":"","page":""},"s3_targets":{"answer":"yes or no","detail":"","page":""},"sbti_near":{"answer":"Yes Aligned Committed Removed or No","detail":"","page":""},"sbti_netzero":{"answer":"Yes Aligned Committed Removed or No","detail":"","page":""},"s1_reductions":{"answer":"Reached target Over 75% Over 50% Over 25% Over 10% 0-10% or Increase","detail":"","page":""},"s2_reductions":{"answer":"same options","detail":"","page":""},"s3_reductions":{"answer":"same options","detail":"","page":""},"reported_progress":{"answer":"All 3 scopes 2 scopes 1 scope or None","detail":"","page":""},"sbti_targets_text":{"near_term":"","net_zero":"","base_year":null}}`;
      const sR=await ask([{role:'user',content:sP}],'Score sustainability maturity from the report. Return ONLY the JSON object.',2000,120000);
      scData=parseJSON(sR);
    }catch(e){
      scData={};S.exMsg[co.n]='scoring: '+e.message.substring(0,50);render();
    }

    // Step C: Intel (sequential)
    S.exMsg[co.n]='fetching intel...';render();
    try{
      const iP=`Today is ${today}. Search for recent news about "${co.n}" sustainability — greenwashing, leadership changes, new targets, regulatory actions, share price ESG signals.\n\nReturn ONLY this JSON:\n{"greenwashing":{"headline":"","detail":"","date":""},"leadership":{"headline":"","detail":"","date":""},"targets_news":{"headline":"","detail":"","date":""},"share_price_signal":{"headline":"","detail":"","date":""},"other_interesting":{"headline":"","detail":"","date":""},"summary":"2-3 sentence summary of key sustainability signals"}`;
      const iR=await ask([{role:'user',content:iP}],'Search for sustainability news. Return ONLY the JSON object.',1000,60000);
      itData=parseJSON(iR);
    }catch(_){itData={summary:'Intel unavailable'};}

    S.extracted[co.n]={name:co.n,url:s.report_url,year:s.report_year||ylast(),em:emData,sc:scData,urls,anote:s.anote||''};
    S.intel[co.n]=itData;
    S.exStatus[co.n]='done';S.exMsg[co.n]='';
    render();
  }
  S.busy=false;S.step=4;render();
}

    rows.push(['Total MB',...yls().map(y=>((e.scope1?.[y]??0)+(e.scope2_mb?.[y]??0)+(e.scope3_total?.[y]??0))||'')]);
    rows.push([]);rows.push(['Question','Answer','Accounting','Market','Evidence','Page']);
    QS.forEach(q=>{const qd=sc[q.k]||{};rows.push([q.l,qd.answer||'',ACC.includes(q.k)?g(q.k):'',MKT.includes(q.k)?g(q.k):'',qd.detail||'',qd.page||'']);});
    const tA=QS.reduce((x,q)=>x+(getSc(q.k,sc[q.k]?.answer||'')??0),0);const tM=QS.reduce((x,q)=>x+(MKT.includes(q.k)?(getSc(q.k,sc[q.k]?.answer||'')??0):0),0);rows.push(['TOTAL','',tA,tM]);
    const it=S.intel[co.n]||{};if(it.summary){rows.push([]);rows.push(['Intel']);rows.push([it.summary]);}
    ['greenwashing','leadership','targets_news','share_price_signal','other_interesting'].forEach(k=>{if(it[k]?.headline)rows.push([k,it[k].headline,it[k].date||'']);});
  });
  dlCSV(buildCSV(rows),S.client+'_benchmarking.csv');
}

function exportNorm(){
  const h=['SUPPLIER NAME','WEBSITE','ID/VAT','INDUSTRY','SIZE','COUNTRY CODE','EMISSION PERIOD START','EMISSION PERIOD END','SOURCE','SCOPE 1','SCOPE 2 LB','SCOPE 2 MB','SCOPE 2 UNKNOWN','SCOPE 3 TOTAL','SCOPE 3 UPSTREAM','SCOPE 3 CATEGORIES INCLUDED','3.1','3.2','3.3','3.4','3.5','3.6','3.7','3.8','SCOPE 1 INTENSITY','SCOPE 2 LB INTENSITY','SCOPE 2 MB INTENSITY','SCOPE 2 UNKNOWN INTENSITY','SCOPE 3 TOTAL INTENSITY','SCOPE 3 UPSTREAM INTENSITY','REVENUE','REVENUE UNIT','HAS TARGETS','TARGET TYPE','SBTI STAGE','BASE YEAR','S1 BASE','S2 BASE','S3 BASE','SCOPE 1 TARGET','SCOPE 2 TARGET','S1+2 TARGET','SCOPE 3 TARGET','ALL SCOPES TARGET','OTHER TARGETS'];
  const dR=[];
  S.companies.filter(c=>S.sources[c.n]?.approved).forEach(co=>{
    const d=S.extracted[co.n];if(!d)return;const e=d.em||{},sc=d.sc||{},sb=sc.sbti_targets_text||{},src=S.sources[co.n]||{};
    const yl=ylast(),rev=e.revenue_eur_m??'',s1=e.scope1?.[yl]??'',s2lb=e.scope2_lb?.[yl]??'',s2mb=e.scope2_mb?.[yl]??'',s3t=e.scope3_total?.[yl]??'';
    const cats=[1,3,4,5,6,7,8].filter(i=>e[`s3_${i}`]?.[yl]!=null).join(',');
    const hasTgt=['s1s2_targets','s3_targets','sbti_near','sbti_netzero'].some(k=>sc[k]?.answer&&sc[k].answer.toLowerCase()!=='no')?'yes':'no';
    const stage=(()=>{const n=(sc.sbti_near?.answer||'').toLowerCase();if(n==='yes'||n==='aligned')return'validated';if(n==='committed')return'committed';return'';})();
    const safe=v=>v!==''&&rev!==''?(Number(v)/Number(rev)).toFixed(4):'';const ey=S.years[S.years.length-1];
    dR.push([co.n,src.company_website||'','',src.industry||'','',src.country_code||'WW',ey.l+'-01-01',ey.l+'-12-31',d.url||'',s1,s2lb,s2mb,'',s3t,s3t,cats,e.s3_1?.[yl]??'',e.s3_2?.[yl]??'',e.s3_3?.[yl]??'',e.s3_4?.[yl]??'',e.s3_5?.[yl]??'',e.s3_6?.[yl]??'',e.s3_7?.[yl]??'',e.s3_8?.[yl]??'',safe(s1),'',safe(s2mb),'',safe(s3t),'',rev,'millions EUR',hasTgt,stage?'SBTI':hasTgt==='yes'?'OTHER':'',stage,sb.base_year||'',sb.s1_base||'',sb.s2_base||'',sb.s3_base||'',sc.s1s2_targets?.detail||'',sc.s1s2_targets?.detail||'',sb.near_term||'',sb.net_zero||'',sb.net_zero||'']);
  });
  dlCSV(buildCSV([h,...dR]),S.client+'_normative_bulk_upload.csv');
}

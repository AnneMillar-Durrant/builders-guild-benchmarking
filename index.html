<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Builders Guild — Manual Benchmarking Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0f1117; --surface: #1a1d26; --border: #2e3250;
            --accent: #c8f04f; --text: #e8eaf6; --muted: #7b82a8;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--surface); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; background: #000; color: #0f0; border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: monospace; }
        .btn { background: var(--accent); color: #000; padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        input { background: var(--surface); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BG Benchmarking Assistant</h1>
        <p style="color: var(--muted)">Paste report text below to generate your Excel/Normative data.</p>
        
        <div class="card">
            <label>1. Company Name</label><br>
            <input type="text" id="coName" placeholder="e.g. Meltwater"><br>
            
            <label>2. Paste Report Text (Copy from PDF)</label>
            <textarea id="reportText" placeholder="Paste all text from the sustainability report here..."></textarea>
            
            <label style="margin-top:10px; display:block;">3. Your Claude API Key</label>
            <input type="password" id="apiKey" placeholder="sk-ant-...">
            
            <div style="margin-top: 20px;">
                <button class="btn" onclick="processData()">Analyze Report →</button>
            </div>
        </div>

        <div id="status" style="font-family: monospace; color: var(--accent);"></div>
    </div>

    <script>
        async function processData() {
            const name = document.getElementById('coName').value;
            const text = document.getElementById('reportText').value;
            const key = document.getElementById('apiKey').value;
            const status = document.getElementById('status');

            if(!key) { alert("Please enter your API Key"); return; }

            status.innerText = "Processing... this takes about 30 seconds.";

            // This prompt is much more efficient and uses fewer tokens
            const prompt = `Act as a sustainability analyst. I am providing text from a report for ${name}. 
            Extract Scope 1, 2 (MB), and 3 (Total) emissions for 2023 and 2024. 
            Also answer if they have SBTi targets (Yes/No).
            Return ONLY a JSON object: 
            {"s1_2024": 0, "s2_2024": 0, "s3_2024": 0, "sbti": "Yes"}`;

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': key,
                        'anthropic-version': '2023-06-01',
                        'dangerouslyAllowBrowser': 'true' // Note: This is for testing only
                    },
                    body: JSON.stringify({
                        model: 'claude-3-haiku-20240307', // Using a cheaper model to save you tokens
                        max_tokens: 1000,
                        messages: [{ role: 'user', content: prompt + "\n\nText: " + text.slice(0, 50000) }]
                    })
                });

                const data = await response.json();
                console.log(data);
                status.innerText = "Success! Data extracted. Ready for Excel export.";
                // (Excel export logic would go here)
            } catch (err) {
                status.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>

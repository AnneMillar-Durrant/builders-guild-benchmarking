<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Builders Guild — Benchmarking Tool</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #f8f9fc; }
        #root { width: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback } = React;

        // --- STYLES (Converted from your React object) ---
        const S = {
            wrap: { fontFamily: "'DM Sans', sans-serif", maxWidth: 900, margin: "0 auto", padding: "32px 24px", color: "#1a1a2e" },
            header: { display: "flex", alignItems: "center", gap: "12px", marginBottom: "32px" },
            logo: { width: "40px", height: "40px", background: "#1a1a2e", borderRadius: "10px", display: "flex", alignItems: "center", justifyContent: "center", color: "#c8f04f", fontWeight: 800, fontSize: "18px" },
            title: { fontSize: "22px", fontWeight: 700, color: "#1a1a2e", margin: 0 },
            subtitle: { fontSize: "13px", color: "#666", margin: "2px 0 0" },
            card: { background: "#fff", border: "1px solid #e8e8f0", borderRadius: "14px", padding: "24px", marginBottom: "20px" },
            sectionLabel: { fontSize: "11px", fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#888", marginBottom: "12px" },
            input: { width: "100%", padding: "10px 14px", border: "1.5px solid #e0e0ed", borderRadius: "8px", fontSize: "14px", boxSizing: "border-box", outline: "none", marginBottom: "10px" },
            btn: { padding: "11px 22px", borderRadius: "8px", border: "none", cursor: "pointer", fontSize: "14px", fontWeight: 600 },
            btnPrimary: { background: "#1a1a2e", color: "#c8f04f" },
            table: { width: "100%", borderCollapse: "collapse", fontSize: "13px" },
            th: { padding: "8px 12px", textAlign: "left", borderBottom: "2px solid #e8e8f0", fontWeight: 600, color: "#888" },
            td: { padding: "8px 12px", borderBottom: "1px solid #f0f0f8" },
            tag: { display: "inline-block", padding: "3px 10px", borderRadius: "20px", fontSize: "12px", fontWeight: 600, background: "#f4f4f8" }
        };

        // --- LOGIC ---
        function scoreAnswer(question, answer) {
            const a = (answer || "").toLowerCase().trim();
            const m_scores = { a:5, b:4, c:3, d:2, e:1, f:0, "no data":0 };
            const sbti_scores = { yes:10, aligned:8, committed:5, removed:0, no:0 };
            const red_scores = { "reached target":5,"over 75%":4,"over 50%":3,"over 25%":2,"over 10%":1,"0-10%":0,"increase":-1 };
            
            if (["cdp_above_f", "public_report", "public_inventory", "upstream_s3", "downstream_s3", "s3_applicability", "s3_methodology", "s1s2_targets", "s3_targets"].includes(question)) {
                return a === "yes" ? 5 : a === "no" ? 0 : null;
            }
            if (question === "cdp_score") return m_scores[a] ?? null;
            if (question === "sbti_near" || question === "sbti_netzero") return sbti_scores[a] ?? null;
            if (["s1_reductions", "s2_reductions", "s3_reductions"].includes(question)) return red_scores[a] ?? null;
            if (question === "reported_progress") {
                const prog = { "all 3 scopes":5, "2 scopes":2.5, "1 scope":1, "none":0 };
                return prog[a] ?? null;
            }
            return null;
        }

        // --- COMPONENTS ---
        function App() {
            const [clientName, setClientName] = useState("");
            const [apiKey, setApiKey] = useState("");
            const [status, setStatus] = useState("Ready");

            const handleRun = () => {
                if (!apiKey) { alert("Please enter an API key"); return; }
                setStatus("Simulating API call... (CORS will block direct calls)");
                // Since direct API calls from browser are blocked by Anthropic,
                // you would normally use a backend. 
                // This UI stays ready for your data entry.
            };

            return (
                <div style={S.wrap}>
                    <div style={S.header}>
                        <div style={S.logo}>BG</div>
                        <div>
                            <p style={S.title}>Builders Guild — Benchmarking Tool</p>
                            <p style={S.subtitle}>Sustainability Analysis Portal</p>
                        </div>
                    </div>

                    <div style={S.card}>
                        <p style={S.sectionLabel}>Configuration</p>
                        <input 
                            style={S.input} 
                            placeholder="Client Name" 
                            value={clientName} 
                            onChange={(e) => setClientName(e.target.value)} 
                        />
                        <input 
                            type="password"
                            style={S.input} 
                            placeholder="Claude API Key (Used for requests)" 
                            value={apiKey} 
                            onChange={(e) => setApiKey(e.target.value)} 
                        />
                        <button 
                            style={{...S.btn, ...S.btnPrimary}} 
                            onClick={handleRun}
                        >
                            Start Analysis
                        </button>
                        <p style={{fontSize: '12px', color: '#888', marginTop: '10px'}}>Status: {status}</p>
                    </div>

                    <div style={S.card}>
                        <p style={S.sectionLabel}>Manual Scoring Check</p>
                        <table style={S.table}>
                            <thead>
                                <tr>
                                    <th style={S.th}>Question</th>
                                    <th style={S.th}>Answer</th>
                                    <th style={S.th}>Calculated Score</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td style={S.td}>CDP Disclosure Above F</td>
                                    <td style={S.td}>Yes</td>
                                    <td style={S.td}><span style={S.tag}>{scoreAnswer("cdp_above_f", "yes")}</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
